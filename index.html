// State
const state = { section:"mistakes", expandedZone:null, checked:{}, energy:"medium" };

// Persist checks in localStorage
function loadChecks(){ try{ const s=localStorage.getItem('room_checks'); if(s) Object.assign(state.checked, JSON.parse(s)); }catch(e){} }
function saveChecks(){ try{ localStorage.setItem('room_checks', JSON.stringify(state.checked)); }catch(e){} }
loadChecks();

const IMPACT_COLOR = {HIGHEST:P.red,HIGH:P.warm,MEDIUM:P.sage,LOW:P.inkLight};

function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{ if(k==='style') Object.assign(e.style,v); else if(k==='class') e.className=v; else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v); else e.setAttribute(k,v); });
  if(children) (Array.isArray(children)?children:[children]).forEach(c=>{ if(c==null||c===false) return; e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return e;
}
function div(attrs,children){ return el('div',attrs,children); }
function btn(attrs,children){ return el('button',attrs,children); }
function span(attrs,children){ return el('span',attrs,children); }

function toggle(key){ state.checked[key]=!state.checked[key]; saveChecks(); render(); }
function checkBtn(key){
  const b=btn({class:'check-btn '+(state.checked[key]?'checked':''),onClick:()=>toggle(key)}, state.checked[key]?'✓':'');
  return b;
}

function renderMistakes(){
  return DATA.mistakes.map(m=>
    div({class:'card',style:{borderLeft:`4px solid ${IMPACT_COLOR[m.impact]}`}},[
      div({style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'8px'}},[
        div({style:{fontWeight:600,fontSize:'14px',color:P.ink,lineHeight:'1.4'}},m.title),
        span({class:'impact-badge',style:{background:IMPACT_COLOR[m.impact]}},m.impact),
      ]),
      div({style:{fontSize:'13px',color:P.inkLight,marginTop:'6px',lineHeight:'1.5'}},m.detail),
    ])
  );
}

function renderDeclutter(){
  const items=[
    div({class:'notice notice-red'},[el('strong',{},'⚠️ GUARDRAIL:'),' Complete zones in order. Do not skip to Zone B until Zone A tasks are done. This is the rule that protects you.']),
  ];
  DATA.declutter.forEach((z,zi)=>{
    const open=state.expandedZone===zi;
    const wrap=div({class:'card',style:{padding:'0',overflow:'hidden'}},[]);
    const header=btn({class:'zone-header',onClick:()=>{ state.expandedZone=open?null:zi; render(); }},[
      div({},[
        div({style:{fontWeight:700,fontSize:'14px',color:P.ink}},[
          span({style:{color:P.warm,marginRight:'8px'}},'#'+z.priority), z.zone
        ]),
        div({style:{fontSize:'12px',color:P.inkLight,marginTop:'2px'}},z.tasks.length+' tasks · Energy: '+ENERGY[z.energy].label),
      ]),
      span({style:{fontSize:'18px',color:P.inkLight}},open?'▲':'▼'),
    ]);
    wrap.appendChild(header);
    if(open){
      const body=div({class:'zone-body'},[]);
      z.tasks.forEach((t,ti)=>{
        const key=`d-${zi}-${ti}`;
        const done=state.checked[key];
        const row=div({class:'task-row '+(done?'done':''),style:{background:done?P.sageLight:P.bgDark}},[
          checkBtn(key),
          div({style:{flex:1}},[
            div({style:{marginBottom:'4px'}},[span({class:'tag tag-blue'},'⏱ '+t.time)]),
            div({style:{fontSize:'13px',color:P.ink,lineHeight:'1.4',textDecoration:done?'line-through':'none'}},t.task),
            t.guardrail?div({style:{fontSize:'12px',color:P.red,marginTop:'6px',fontStyle:'italic'}},'🛑 '+t.guardrail):null,
          ]),
        ]);
        body.appendChild(row);
      });
      wrap.appendChild(body);
    }
    items.push(wrap);
  });
  return items;
}

function renderCleaning(){
  const items=[div({class:'notice notice-sage'},[el('strong',{},'💡 Cleaning comes AFTER decluttering.'),' Cleaning around clutter wastes time and energy. These steps assume the zones are cleared first.'])];
  DATA.cleaning.forEach((s,i)=>{
    const key=`c-${i}`;
    const done=state.checked[key];
    const e=ENERGY[s.energy];
    items.push(div({class:'card',style:{opacity:done?'0.7':'1',background:done?P.sageLight:P.white}},[
      div({style:{display:'flex',gap:'10px',alignItems:'flex-start'}},[

        div({style:{flex:1}},[
          div({style:{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'4px'}},[
            span({style:{fontWeight:700,fontSize:'14px',color:P.ink}},s.step),
            span({class:'tag',style:{background:e.color,border:`1px solid ${e.border}`}},e.label),

          div({style:{fontSize:'13px',color:P.inkLight,lineHeight:'1.5'}},s.detail),

    ]));
  });
  return items;
}

function renderLayout(){

    div({class:'card',style:{borderLeft:`4px solid ${P.blue}`}},[

function renderShopping(){

function renderADHD(){
  const d=DATA.adhd;
  const items=[
    div({class:'notice notice-blue'},[
      div({style:{fontWeight:700,fontSize:'14px',color:P.ink,marginBottom:'4px'}},'Your brain is not broken. The process is wrong.'),
      div({style:{fontSize:'13px',color:P.inkLight,lineHeight:'1.5'}},'Standard decluttering advice is designed for neurotypical brains with consistent energy and no activation barrier. This plan is designed for yours: start small, stay scoped, match energy, stop before the crash.'),
    ]),
    div({style:{marginTop:'4px'}},[

      div({style:{display:'flex',flexDirection:'column',gap:'8px'}},

      div({style:{fontWeight:700,fontSize:'13px',letterSpacing:'1px',textTransform:'uppercase',color:P.inkLight,marginBottom:'8px'}},'Tasks By Energy Level'),
      div({style:{display:'flex',gap:'6px',marginBottom:'10px',flexWrap:'wrap'}},
        d.energyMap.map(e=>{
          const active=state.energy===e.level;
          const eg=ENERGY[e.level];
          return btn({
            class:'energy-btn',
            style:{border:`2px solid ${eg.border}`,background:active?eg.border:eg.color,color:active?P.white:P.ink,fontWeight:active?'700':'400'},
            onClick:()=>{ state.energy=e.level; render(); }

        })
      ),
      ...d.energyMap.filter(e=>e.level===state.energy).map(e=>{
        const eg=ENERGY[e.level];
        return div({class:'card',style:{border:`1px solid ${eg.border}`}},
          e.tasks.map((t,ti)=>{
            const key=`en-${e.level}-${ti}`;
            const done=state.checked[key];
            return div({style:{display:'flex',gap:'10px',alignItems:'center',padding:'8px 0',borderBottom:ti<e.tasks.length-1?`1px solid ${P.bgDark}`:'none',opacity:done?'0.5':'1'}},[
              checkBtn(key),
              span({style:{fontSize:'13px',color:P.ink,textDecoration:done?'line-through':'none'}},t),

    div({style:{marginTop:'4px'}},[

      div({class:'card',style:{background:P.redLight,border:`1px solid ${P.red}`}},[
        div({style:{fontSize:'13px',color:P.ink,marginBottom:'8px'}},'If any of these are true: stop, save progress, close the door.'),
        ...d.spiral.map((s,i)=>div({class:'spiral-row'},[span({style:{color:P.red}},'⚠'),s])),
      ]),
    ]),
  ];
  return items;
}

const RENDERERS = {mistakes:renderMistakes,declutter:renderDeclutter,cleaning:renderCleaning,storage:renderStorage,layout:renderLayout,decor:renderDecor,shopping:renderShopping,adhd:renderADHD};

function render(){
  const sec=SECTIONS.find(s=>s.id===state.section);

  // Nav
  const nav=document.getElementById('nav');
  nav.innerHTML='';
  SECTIONS.forEach(s=>{
    const active=s.id===state.section;
    const b=btn({class:'nav-btn '+(active?'active':''),style:{border:`2px solid ${active?s.border:'transparent'}`,background:active?s.color:P.white},onClick:()=>{ state.section=s.id; render(); }},s.icon+' '+s.title.replace(/^\d+\.\s*/,''));
    nav.appendChild(b);
  });

  // Section header
  document.querySelector('#section-header h2').textContent=sec.icon+' '+sec.title;
  document.querySelector('#section-header p').textContent=sec.sub;

  // Content
  const content=document.getElementById('content');
  content.innerHTML='';
  const nodes=RENDERERS[state.section]();
  (Array.isArray(nodes)?nodes:[nodes]).forEach(n=>{ if(n) content.appendChild(n); });
}

render();

// PWA: register service worker for offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}

// --- Passcode lock ---
const LOCK_HASH = '53163ccf7326a1b5dce7a30bcd63ce7e669f24cffe83be43d2332ee253c4f681';
const LOCK_KEY = 'tcc_unlocked';

async function sha256Hex(text){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function showApp(){
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

if (localStorage.getItem(LOCK_KEY) === '1') {
  showApp();
} else {
  document.getElementById('lock-screen').style.display = 'flex';
  const input = document.getElementById('lock-input');
  const error = document.getElementById('lock-error');
  const tryUnlock = async () => {
    const hash = await sha256Hex(input.value);
    if (hash === LOCK_HASH) {
      localStorage.setItem(LOCK_KEY, '1');
      showApp();
    } else {
      error.textContent = 'Passcode incorrecto';
      input.value = '';
      input.focus();
    }
  };
  document.getElementById('lock-submit').addEventListener('click', tryUnlock);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(); });
}
